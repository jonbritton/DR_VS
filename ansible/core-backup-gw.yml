---
- name: Deploy production-core backup via S3 File Gateway
  hosts: deadline_repo
  become: true
  vars:
    gw_nfs_export: ""          # from the storage-gateway module output, e.g. 10.0.0.20:/render-farm-dev-dr-058264204697
    gw_mount: /mnt/dr-gw
    file_share_arn: ""         # from the storage-gateway module output
    mongo_uri: "mongodb://localhost:27017"

  tasks:
    - name: Install NFS client
      ansible.builtin.package:
        name: nfs-common
        state: present

    - name: Create mount point
      ansible.builtin.file:
        path: "{{ gw_mount }}"
        state: directory
        mode: "0755"

    - name: Mount the File Gateway share
      ansible.posix.mount:
        path: "{{ gw_mount }}"
        src: "{{ gw_nfs_export }}"
        fstype: nfs
        # Gateway-recommended options: hard mount, no client-side lock, survive reboots.
        opts: "nofail,_netdev,hard,noresvport,nolock,timeo=600,retrans=2"
        state: mounted

    - name: Install backup script
      ansible.builtin.copy:
        src: ../dr/core-backup-gw.sh
        dest: /usr/local/bin/core-backup-gw.sh
        mode: "0750"

    - name: Configure environment
      ansible.builtin.copy:
        dest: /etc/core-backup-gw.env
        mode: "0600"
        content: |
          GW_MOUNT={{ gw_mount }}
          FILE_SHARE_ARN={{ file_share_arn }}
          MONGO_URI={{ mongo_uri }}

    - name: Install systemd units
      ansible.builtin.copy:
        src: "../dr/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop: [core-backup-gw.service, core-backup-gw.timer]

    - name: Enable timer
      ansible.builtin.systemd:
        name: core-backup-gw.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Run one backup now (smoke test)
      ansible.builtin.systemd:
        name: core-backup-gw.service
        state: started
