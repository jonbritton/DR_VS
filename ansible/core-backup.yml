---
- name: Deploy production-core backup
  hosts: deadline_repo
  become: true
  vars:
    dr_bucket: ""
    mongo_uri: "mongodb://deadline:27017"

  tasks:
    - name: Install backup script
      ansible.builtin.copy:
        src: ../dr/core-backup.sh
        dest: /usr/local/bin/core-backup.sh
        mode: "0750"

    - name: Configure environment
      ansible.builtin.copy:
        dest: /etc/core-backup.env
        mode: "0600"
        content: |
          BUCKET={{ dr_bucket }}
          MONGO_URI={{ mongo_uri }}

    - name: Install systemd units
      ansible.builtin.copy:
        src: "../dr/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop: [core-backup.service, core-backup.timer]

    - name: Enable timer
      ansible.builtin.systemd:
        name: core-backup.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Run one backup now (smoke test)
      ansible.builtin.systemd:
        name: core-backup.service
        state: started