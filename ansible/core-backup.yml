---
- name: Deploy production-core backup
  hosts: deadline_repo
  become: true
  vars:
    dr_bucket: ""
    mongo_uri: "mongodb://localhost:27017"
    work_root: /var/tmp        # holds the dump during upload — real disk, not tmpfs
    min_free_mb: 2048          # backup refuses to start below this much free space
    max_bandwidth: ""          # e.g. 6MB/s — cap the S3 upload; empty = unthrottled
    # Write-only backup identity (attach the <name_prefix>-dr-backup-writer
    # policy from terraform/modules/dr-bup). Vault-encrypt these in
    # group_vars/inventory — never pass them as plain -e on a command line.
    # Leave both empty to rely on credentials already configured on the host.
    aws_access_key_id: ""
    aws_secret_access_key: ""
    aws_region: "us-west-2"

  tasks:
    - name: Preflight — validate required settings
      ansible.builtin.assert:
        that:
          - dr_bucket | length > 0
          - (aws_access_key_id | length > 0) == (aws_secret_access_key | length > 0)
        fail_msg: >-
          Set dr_bucket, and provide aws_access_key_id/aws_secret_access_key
          together or not at all.

    - name: Install backup script
      ansible.builtin.copy:
        src: ../dr/core-backup.sh
        dest: /usr/local/bin/core-backup.sh
        mode: "0750"

    - name: Configure environment
      ansible.builtin.copy:
        dest: /etc/core-backup.env
        mode: "0600"
        content: |
          BUCKET={{ dr_bucket }}
          MONGO_URI={{ mongo_uri }}
          WORK_ROOT={{ work_root }}
          MIN_FREE_MB={{ min_free_mb }}
          {% if max_bandwidth | length > 0 %}
          MAX_BANDWIDTH={{ max_bandwidth }}
          {% endif %}
          {% if aws_access_key_id | length > 0 %}
          AWS_ACCESS_KEY_ID={{ aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY={{ aws_secret_access_key }}
          AWS_DEFAULT_REGION={{ aws_region }}
          {% endif %}

    - name: Install systemd units
      ansible.builtin.copy:
        src: "../dr/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop: [core-backup.service, core-backup.timer]
      notify: Reload systemd

    # Run the handler NOW if the units changed, so the timer enable and the
    # smoke test below act on the new definitions, not the previously loaded
    # ones (handlers otherwise fire only at the end of the play).
    - name: Apply pending systemd reload
      ansible.builtin.meta: flush_handlers

    - name: Enable timer
      ansible.builtin.systemd:
        name: core-backup.timer
        enabled: true
        state: started

    - name: Run one backup now (smoke test)
      ansible.builtin.systemd:
        name: core-backup.service
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
